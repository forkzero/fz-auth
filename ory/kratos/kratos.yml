version: v26.2.0

dsn: postgres://kratos:kratos@postgres:5432/kratos?sslmode=disable

serve:
  public:
    base_url: http://localhost:4433/
    cors:
      enabled: true
      allowed_origins:
        - http://localhost:3100
        - http://localhost:5173
      allowed_methods:
        - POST
        - GET
        - PUT
        - PATCH
        - DELETE
      allowed_headers:
        - Authorization
        - Cookie
        - Content-Type
  admin:
    base_url: http://kratos:4434/

selfservice:
  default_browser_return_url: http://localhost:3100/login
  allowed_return_urls:
    - http://localhost:3100
    - http://localhost:5173

  methods:
    password:
      enabled: true
    code:
      enabled: true
      passwordless_enabled: false
  flows:
    login:
      ui_url: http://localhost:3100/login
      lifespan: 10m
    registration:
      ui_url: http://localhost:3100/registration
      lifespan: 10m
      after:
        password:
          hooks:
            - hook: show_verification_ui
    verification:
      ui_url: http://localhost:3100/verification
      enabled: true
      use: code
    recovery:
      ui_url: http://localhost:3100/recovery
      enabled: true
    settings:
      ui_url: http://localhost:3100/settings
      privileged_session_max_age: 15m
    error:
      ui_url: http://localhost:3100/error

session:
  cookie:
    domain: localhost
    same_site: Lax

oauth2_provider:
  url: http://hydra:4445

log:
  level: info
  format: json
  leak_sensitive_values: false

identity:
  default_schema_id: default
  schemas:
    - id: default
      url: file:///etc/kratos/identity.schema.json

courier:
  smtp:
    connection_uri: smtps://test:test@mailslurper:1025/?skip_ssl_verify=true
